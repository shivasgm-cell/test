<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rina ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{overflow:hidden;background:black;color:white;}

/* ⭐ LOAD FUTURA FONT */
@font-face {
    font-family: 'Futura';
    src: url('Futura.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

/* VIDEO */
video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:-1;
}

/* TOP RIGHT TEXT */
#volumeNote{
position:fixed;
top:20px;
right:20px;
font-size:14px;
opacity:0;
animation:fadeIn 4s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:1s;
}

.hidden{opacity:0;pointer-events:none;}

/* ZOOM EFFECT */
.zoom{
animation:zoomInOut 2s ease;
}

@keyframes zoomInOut{
0%{transform:scale(1.2);}
50%{transform:scale(1);}
100%{transform:scale(1.05);}
}

/* PASSWORD BOX */
#lockBox{
opacity:0;
transition:6s;
text-align:center;
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:20px;
}

input{
padding:10px;
border-radius:20px;
border:none;
margin-top:10px;
}

/* ⭐ TYPEWRITER TEXT — FUTURA */
.typewriter{
overflow:hidden;
white-space:nowrap;
border-right:2px solid;
animation:typing 6s steps(50,end);
font-size:48px;
text-align:center;
margin-top:-40px;

font-family:'Futura', sans-serif;
color:#2b1a1a;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

/* BUTTON */
button{
padding:12px 25px;
border-radius:30px;
border:none;
background:linear-gradient(45deg,#ffd700,#ffb6c1);
cursor:pointer;
margin-top:15px;
}

/* WHAT BUTTON */
#whatBtn{
margin-top:20px;
font-size:22px;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
0%{box-shadow:0 0 5px #ffb6c1;}
100%{box-shadow:0 0 20px #ffd700;}
}

/* GIF1 */
#gif1{
width:250px;
opacity:0;
transition:opacity 3s;
margin-bottom:30px;
}

/* ⭐ PAGE TEXT — FUTURA */
.peachText{
font-family:'Futura', sans-serif;
font-size:42px;
text-align:center;
}

/* ⭐ PAGE 4 FIX */
#page4{
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

#page4 img{
max-height:60vh;
width:auto;
border-radius:10px;
margin-bottom:20px;
}

.hand{
font-family:'Great Vibes', cursive;
font-size:32px;
line-height:1.4;
}

</style>
</head>

<body>

<div id="volumeNote">🔊 Please turn up volume</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<!-- 🔐 PAGE 0 -->
<div id="page0" class="page zoom">

<video id="intro1" autoplay muted playsinline>
<source src="intro1.mp4">
</video>

<div id="lockBox">
<h2>Enter Password</h2>
<p>(Password:MMDD)</p>
<input type="password" id="pass">
<br>
<button onclick="unlock()">Enter</button>
</div>

</div>

<!-- 💖 PAGE 1 -->
<div id="page1" class="page hidden zoom">

<video id="intro2" muted playsinline>
<source src="intro2.mp4">
</video>

<img id="gif1" src="gif1.gif">

<h1 class="typewriter">Hi Rina,<br>I have something for you...</h1>

<button id="whatBtn" onclick="nextPage(2)">What?</button>

</div>

<!-- 💝 PAGE 2 -->
<div id="page2" class="page hidden">

<video id="intro3" muted playsinline>
<source src="intro3.mp4">
</video>

<img id="gif2" src="gif2.gif">
<img id="gif3" src="gif3.gif" style="display:none;">

<h2 class="peachText" style="color:black;">
Can I show you something special that I made <br>
just for you...?
</h2>

<button onclick="nextPage(3)">Yes</button>
<button onclick="noClick()" id="noBtn">No</button>

</div>

<!-- 🎂 PAGE 3 -->
<div id="page3" class="page hidden">

<video id="intro4" muted playsinline>
<source src="intro4.mp4">
</video>

<img src="gif5.gif">

<h1 class="peachText" style="color:black;">
I could never forget your birthday, Rina
</h1>

<button onclick="goPage4()">Blow the Candles</button>
</div>

<!-- 💌 PAGE 4 -->
<div id="page4" class="page hidden">

<video id="intro5" muted playsinline>
<source src="intro5.mp4">
</video>

<img src="final.jpg">

<p class="hand" style="color:black;">
To the girl with the prettiest smile,<br>
Happy Birthday Rina :- Shiva♥️
</p>

</div>

<script>

/* FREEZE INTRO1 */
let v1=document.getElementById("intro1");
v1.onended=()=>v1.pause();

/* FADE PASSWORD */
setTimeout(()=>{
document.getElementById("lockBox").style.opacity=1;
},1000);

/* FREEZE INTRO2 */
let v2=document.getElementById("intro2");
v2.onended=()=>v2.pause();

/* FREEZE INTRO3 */
let v3=document.getElementById("intro3");
v3.onended=()=>v3.pause();

/* FREEZE INTRO4 */
let v4=document.getElementById("intro4");
v4.onended=()=>v4.pause();

/* FREEZE INTRO5 */
let v5=document.getElementById("intro5");
v5.onended=()=>v5.pause();

/* UNLOCK */
function unlock(){
let p=document.getElementById("pass").value;

if(p==="0612"){

document.getElementById("page0").classList.add("hidden");

document.getElementById("music").play();

showPage(1);

v2.currentTime = 0;
v2.play();

}else{
alert("correct password is :0612");
}
}

/* PAGE SWITCH */
function showPage(n){
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById("page"+n).classList.remove("hidden");

    /* PAGE 1 GIF fade-in */
    if(n === 1){
        setTimeout(()=>{
            document.getElementById("gif1").style.opacity = 1;
        }, 500);
    }

    /* PAGE 2 — start intro3 */
    if(n === 2){
        v3.currentTime = 0;
        v3.play();
    }

    /* PAGE 3 — start intro4 */
    if(n === 3){
        v4.currentTime = 0;
        v4.play();
    }

    /* PAGE 4 — start intro5 */
    if(n === 4){
        v5.currentTime = 0;
        v5.play();
    }
}

/* NEXT */
function nextPage(n){
showPage(n);
document.getElementById("music").play();
}

/* NO BUTTON */
function noClick(){
document.getElementById("gif2").style.display="none";
document.getElementById("gif3").style.display="block";
document.querySelector("#page2 h2").innerText="Aww... please open it !";
document.getElementById("noBtn").style.display="none";
}

/* ⭐ GO TO PAGE 4 */
function goPage4(){
showPage(4);
}

</script>

</body>
</html>
