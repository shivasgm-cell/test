<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPG correct❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color: transparent;
}

body{
background:black;
color:white;
overflow:hidden;
}

/* VIDEO */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.20);
z-index:-1;
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
transition:0.8s ease;
}

.hidden{
opacity:0;
transform:translateY(30px) scale(0.95);
pointer-events:none;
}

/* GLASS BACKGROUND FOR ALL TEXT */
.textGlass{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:15px 25px;
border-radius:18px;
margin-top:10px;
}

/* TEXT – ALL WHITE */
.typewriter,
.peachText,
.hand {
    color:white !important;
    font-family:'Great Vibes',cursive;
}

/* IMAGES */
img{
max-width:75%;
border-radius:12px;
}

    /* Romantic fade‑up effect */
.fadeUp {
    opacity: 0;
    transform: translateY(25px);
    animation: fadeUp 2.2s ease forwards;
}

@keyframes fadeUp {
    0% {
        opacity: 0;
        transform: translateY(25px);
    }
    60% {
        opacity: 1;
        transform: translateY(10px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}


/* ⭐ FINAL.JPG — MATCH IMAGE 1 STYLE ⭐ */
#page4 img {
    width: min(420px, 70vw);   /* perfect portrait size */
    height: auto;
    max-height: 70vh;
    object-fit: contain;       /* prevents zoom/crop */
    border-radius: 30px;       /* smooth rounded edges */
    box-shadow: 0 0 35px rgba(255,255,255,0.35); /* soft glow */
    animation: fadeIn 1.8s ease forwards, glowPulse 3s ease-in-out infinite;
}

/* Fade-in animation */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.94); }
    to { opacity: 1; transform: scale(1); }
}

/* Glow pulse */
@keyframes glowPulse {
    0% { box-shadow: 0 0 10px rgba(255,255,255,0.25); }
    50% { box-shadow: 0 0 35px rgba(255,255,255,0.55); }
    100% { box-shadow: 0 0 10px rgba(255,255,255,0.25); }
}

/* BUTTON */
button{
padding:14px 24px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ffd700,#ff9ec4);
color:black;
font-weight:bold;
margin-top:15px;
font-size:16px;
transition:0.25s;
}

button:active{
transform:scale(0.9);
box-shadow:0 0 20px gold;
}

/* GLOW */
#whatBtn{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 5px pink;}
50%{box-shadow:0 0 25px gold;}
100%{box-shadow:0 0 5px pink;}
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:20px;
border:none;
margin-top:10px;
text-align:center;
}



@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
100%{transform:translateY(-110vh);opacity:1;}
}

/* NOTE */
#volumeNote{
position:fixed;
top:10px;
right:10px;
font-size:12px;
}

</style>
</head>

<body>

<div id="volumeNote">🔊 Please Turn ON Sound</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<!-- PAGE 0 -->
<div id="page0" class="page">
<video autoplay muted playsinline>
<source src="intro1.mp4">
</video>

<div id="lockBox" class="glass textGlass">
<h2>🔐 Enter Password</h2>
<input type="password" id="pass" placeholder="MMDD">
<button onclick="unlock()">Unlock 💖</button>
</div>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page hidden">
<video muted playsinline id="v2">
<source src="intro2.mp4">
</video>

<img src="gif1.gif">

<div class="textGlass">
<h1 class="typewriter">Hi Rina,<br>I have something for you...</h1>
</div>

<button id="whatBtn" onclick="nextPage(2)">What?</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden">
<video muted playsinline id="v3">
<source src="intro3.mp4">
</video>

<img id="gif2" src="gif2.gif">
<img id="gif3" src="gif3.gif" style="display:none;">

<div class="textGlass">
<h2 class="peachText">
Can I show you something special<br>I made just for you?
</h2>
</div>

<button onclick="nextPage(3)">Yes</button>
<button onclick="noClick()" id="noBtn">No</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page hidden">
<video muted playsinline id="v4">
<source src="intro4.mp4">
</video>

<img src="gif5.gif">

<div class="textGlass">
<h1 class="peachText">
I could never forget your birthday ❤️
</h1>
</div>

<button onclick="nextPage(4)">Blow the Candles</button>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page hidden">
<video muted playsinline id="v5">
<source src="intro5.mp4">
</video>

<img src="final.jpg">

<p class="hand fadeUp">
    To the girl with the prettiest smile,<br>
    Happy Birthday Rina 💖<br>
    - Shiva
</p>

</div>
</div>

<script>

/* PASSWORD */
function unlock(){
let p=document.getElementById("pass").value;

if(p==="0612"){
document.getElementById("page0").classList.add("hidden");
document.getElementById("music").play();
showPage(1);
}else{
alert("Wrong password😝");
}
}

/* PAGE SWITCH */
function showPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));

setTimeout(()=>{
document.getElementById("page"+n).classList.remove("hidden");
},200);

/* play videos */
if(n===1){document.getElementById("v2").play();}
if(n===2){document.getElementById("v3").play();}
if(n===3){document.getElementById("v4").play();}
if(n===4){document.getElementById("v5").play();}
}

function nextPage(n){
showPage(n);
}

/* NO BUTTON */
function noClick(){
document.getElementById("gif2").style.display="none";
document.getElementById("gif3").style.display="block";
document.querySelector("#page2 h2").innerText="Come on...please say yes 🥺";
document.getElementById("noBtn").style.display="none";
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"%";
h.style.fontSize=(16+Math.random()*20)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

</script>

</body>
</html>
